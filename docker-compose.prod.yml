# Production docker-compose for Work Tact.
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Fronts backend + frontend with an nginx reverse proxy terminating TLS.
# Secrets are loaded from .env.prod (not committed). Certificates are expected at
# ./nginx/certs/{fullchain,privkey}.pem (e.g. issued by Let's Encrypt / certbot).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env.prod
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "4000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env.prod
    depends_on:
      - backend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-enabled:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - internal
      - public

  # Oneshot migrator. Run with:
  #   docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm migrator
  migrator:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"
    networks:
      - internal
    profiles:
      - migrate

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

volumes:
  pg_data:
  redis_data:
