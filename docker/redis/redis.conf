# ============================================================================
# Work Tact — Redis dev config
# ----------------------------------------------------------------------------
# Mounted into the redis container at /usr/local/etc/redis/redis.conf and
# passed to redis-server via the compose `command:` entry. Any directive
# commented out below falls back to the upstream default.
#
# WARNING: this file is tuned for LOCAL DEVELOPMENT. `protected-mode no` and
# the lack of `requirepass` make the instance trivially accessible on the
# docker network -- acceptable when the port is only bound to localhost, NOT
# acceptable in production. For prod use docker-compose.prod.yml, which
# layers on TLS and a password from secrets.
# ============================================================================

# ----------------------------------------------------------------------------
# Networking
# ----------------------------------------------------------------------------
# bind 0.0.0.0  -- accept connections from every interface inside the
# container; compose maps 6379 only to localhost on the host, so reachability
# is still scoped by the docker port binding.
# protected-mode no -- required because we have neither a bind list nor a
# password; see banner above before copying this into prod.
# ----------------------------------------------------------------------------
bind 0.0.0.0
protected-mode no
port 6379

# ----------------------------------------------------------------------------
# Authentication
# ----------------------------------------------------------------------------
# For prod: set REDIS_PASSWORD in the environment and uncomment the line
# below (or template it in via docker-compose.prod.yml). Leaving it disabled
# in dev keeps `redis-cli` / redis-commander zero-friction.
# ----------------------------------------------------------------------------
# requirepass ${REDIS_PASSWORD}

# ----------------------------------------------------------------------------
# Memory
# ----------------------------------------------------------------------------
# 256mb keeps a dev machine predictable; allkeys-lru evicts the least-recently
# used entries once the cap is hit, which matches how the app uses Redis
# (hot-path cache + rate-limit buckets, not a source of truth).
# ----------------------------------------------------------------------------
maxmemory 256mb
maxmemory-policy allkeys-lru

# ----------------------------------------------------------------------------
# Persistence -- AOF (append-only file)
# ----------------------------------------------------------------------------
# AOF replays every write on restart. `everysec` fsyncs once per second,
# the standard durability/throughput trade-off.
# ----------------------------------------------------------------------------
appendonly yes
appendfsync everysec
appendfilename "appendonly.aof"
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ----------------------------------------------------------------------------
# Persistence -- RDB snapshots
# ----------------------------------------------------------------------------
# Belt-and-suspenders alongside AOF: the RDB file is faster to ship around
# for backups/restores.
#   save 900 1      -- snapshot after 15 min if >=1 key changed
#   save 300 10     -- snapshot after  5 min if >=10 keys changed
#   save 60  10000  -- snapshot after  1 min if >=10000 keys changed
# ----------------------------------------------------------------------------
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# ----------------------------------------------------------------------------
# Logging
# ----------------------------------------------------------------------------
# `notice` is Redis' default -- verbose enough to spot evictions and AOF
# rewrites without drowning the terminal in INFO chatter.
# ----------------------------------------------------------------------------
loglevel notice
